<!-- v31 --><!DOCTYPE html>
<html lang="en-US">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beam Contributors — Light the Beam</title>
<meta name="description" content="Every Sacramento King ranked by beams — wins, home or road, since Oct 29, 2022. Pre-beam tab shows the 2001-02 era's wins separately.">
<meta name="theme-color" content="#5b2d8e">
<link rel="canonical" href="https://lightthebe.am/totals">
<link rel="icon" type="image/png" href="/kings-logo.png">
<!-- Indexable: public all-time totals page -->
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--purple:#5b2d8e;--black:#0a0a0a;--beam:#9b4dca}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--black);color:#fff;min-height:100dvh;display:flex;flex-direction:column;align-items:center;text-align:center;overflow-x:hidden;padding-bottom:4rem}
body.beam-dormant::before{content:'';position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:3px;height:40vh;background:linear-gradient(0deg,rgba(155,77,202,.18) 0%,rgba(155,77,202,.06) 60%,transparent 100%);pointer-events:none;z-index:0;animation:beamPulse 3s ease-in-out infinite}
@keyframes beamPulse{0%,100%{opacity:.5}50%{opacity:1}}

.page-nav{position:relative;z-index:2;width:100%;display:flex;justify-content:center;gap:.4rem;padding:.55rem 1rem .25rem;overflow-x:auto;-webkit-overflow-scrolling:touch;flex-shrink:0;border-bottom:1px solid rgba(255,255,255,.04)}
.page-nav a{background:transparent;border:none;border-radius:0;padding:.2rem .5rem;font-size:.7rem;font-weight:800;color:rgba(255,255,255,.5);cursor:pointer;white-space:nowrap;text-decoration:none;text-transform:uppercase;letter-spacing:.1em;transition:color .15s;border-bottom:2px solid transparent;line-height:1.6}
.page-nav a:hover{color:#fff}
.page-nav a.active{color:#fff;border-bottom-color:var(--beam)}

.hero{display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;z-index:1;max-width:780px;width:100%;padding:1.5rem 1rem 1rem}
.page-title{font-size:clamp(1.6rem,5vw,2.4rem);font-weight:900;letter-spacing:.05em;text-transform:uppercase;line-height:1.05}
.page-sub{font-size:.75rem;font-weight:600;opacity:.45;margin-top:.5rem;letter-spacing:.05em;max-width:520px;line-height:1.5}

.status-bar{display:flex;align-items:center;gap:.6rem;margin:1rem 0;font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.15em;opacity:.5}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--beam);box-shadow:0 0 8px rgba(155,77,202,.6);animation:dotPulse 1.4s ease-in-out infinite}
.status-bar.done .status-dot{animation:none;opacity:.3;box-shadow:none}
@keyframes dotPulse{0%,100%{opacity:.4;transform:scale(.85)}50%{opacity:1;transform:scale(1.1)}}

.tab-bar{display:flex;justify-content:center;gap:.4rem;margin:.5rem 0 1rem;flex-wrap:wrap}
.tab{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);border-radius:8px;padding:.4rem 1rem;font-size:.7rem;font-weight:800;color:rgba(255,255,255,.5);cursor:pointer;text-transform:uppercase;letter-spacing:.08em;transition:all .15s;text-decoration:none}
.tab:hover{background:rgba(255,255,255,.08);color:rgba(255,255,255,.85)}
.tab.active{background:var(--beam);border-color:var(--beam);color:#fff}
.tab .count{font-size:.55rem;font-weight:700;opacity:.65;margin-left:.4rem}

.list-section{width:100%;max-width:840px;padding:0 1rem;margin-top:1rem;position:relative;z-index:1}

.player-list{display:flex;flex-direction:column;gap:.4rem}
.player-row{display:grid;grid-template-columns:2rem auto 1fr auto auto auto auto;align-items:center;padding:.6rem .85rem;background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.04);border-radius:10px;text-decoration:none;color:inherit;transition:all .15s;gap:.7rem;border-left:3px solid transparent}
.player-row:hover{background:rgba(255,255,255,.05);border-left-color:var(--beam)}
.player-row.top:not(:hover){border-left-color:rgba(155,77,202,.4)}
.rank{font-size:.75rem;font-weight:800;opacity:.4;text-align:right}
.player-row.top .rank{color:var(--beam);opacity:1}
.player-row .ph{width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.04);object-fit:cover;object-position:top center;flex-shrink:0}
.player-row .info{text-align:left;min-width:0;display:flex;flex-direction:column;gap:.15rem}
.player-row .name-line{display:flex;align-items:center;gap:.5rem;width:100%;min-width:0}
.player-row .name{font-size:.85rem;font-weight:700;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.player-row .pos{font-size:.55rem;opacity:.4;font-weight:700;text-transform:uppercase;letter-spacing:.1em}
.player-row .beams{font-size:1.1rem;font-weight:900;color:var(--beam);text-align:right;min-width:2.5rem}
.player-row .games{font-size:.7rem;font-weight:700;opacity:.5;text-align:right;min-width:3rem}
.player-row .rate{font-size:.7rem;font-weight:800;text-align:right;min-width:3rem;color:#fff}
.player-row .rate.low{opacity:.35}
.player-row .seasons{font-size:.55rem;font-weight:700;opacity:.4;text-align:right;min-width:2rem;text-transform:uppercase;letter-spacing:.08em}

.team-badge{display:inline-flex;align-items:center;gap:.25rem;font-size:.55rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;padding:.12rem .35rem;border-radius:4px;background:rgba(255,255,255,.04);color:rgba(255,255,255,.45);flex-shrink:0;line-height:1}
.team-badge img{width:12px;height:12px}
.team-badge.sac{opacity:.35}
.team-badge.left{background:rgba(155,77,202,.1);color:var(--beam);border:1px solid rgba(155,77,202,.3)}
.team-badge.retired{background:rgba(255,255,255,.04);color:rgba(255,255,255,.5);border:1px solid rgba(255,255,255,.1);font-style:normal}
.team-badge.inactive{background:rgba(255,255,255,.04);color:rgba(255,255,255,.5);border:1px solid rgba(255,255,255,.1)}

.col-label{font-size:.5rem;opacity:.3;text-transform:uppercase;letter-spacing:.12em;font-weight:700;text-align:right}
.header-row{display:grid;grid-template-columns:2rem auto 1fr auto auto auto auto;align-items:center;padding:0 .85rem .4rem;gap:.7rem;border-bottom:1px solid rgba(255,255,255,.05);margin-bottom:.5rem}
.header-row .ph{width:38px;height:38px;visibility:hidden}

.section-header{font-size:.7rem;font-weight:800;text-transform:uppercase;letter-spacing:.2em;opacity:.55;margin:2.5rem 0 .8rem;padding-bottom:.5rem;border-bottom:1px solid rgba(255,255,255,.06);text-align:left}

.coach-list{display:flex;flex-direction:column;gap:.4rem}
.coach-row{display:grid;grid-template-columns:2rem auto 1fr auto auto auto auto;align-items:center;padding:.6rem .85rem;background:rgba(91,45,142,.04);border:1px solid rgba(155,77,202,.12);border-radius:10px;gap:.7rem;text-decoration:none;color:inherit;border-left:3px solid transparent}
.coach-row.current:not(:hover){border-left-color:rgba(155,77,202,.5)}
.coach-row .ph-blank{width:38px;height:38px;border-radius:50%;background:rgba(155,77,202,.1);display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:800;color:var(--beam);flex-shrink:0}

@media(max-width:600px){
  .player-row,.header-row,.coach-row{grid-template-columns:1.4rem auto 1fr auto auto;gap:.4rem;padding:.5rem .65rem}
  .player-row .seasons,.header-row .seasons,.header-row .col-seasons,.player-row .rate,.header-row .col-rate,.coach-row .seasons,.coach-row .rate{display:none}
  .player-row .name{font-size:.78rem}
  .player-row .beams{font-size:.95rem}
}

.note{font-size:.6rem;opacity:.3;font-weight:600;margin-top:1.5rem;line-height:1.6;padding:0 .5rem}
.err{font-size:.85rem;opacity:.5;margin:2rem 0}
</style>
</head>
<body class="beam-dormant">
<nav class="page-nav">
  <a href="/">Home</a>
  <a href="/players">Roster</a>
  <a href="/coaches">Coaches</a>
  <a href="/totals" class="active">Totals</a>
  <a href="/stats">Stats</a>
</nav>
<div class="hero">
  <div class="page-title">Beam Contributors</div>
  <div class="page-sub">Every Sacramento King ranked by beams they were on the floor for — every win lights the beam, home or road. The beam first lit October 29, 2022 — pre-beam wins are shown on a separate tab, not counted as beams.</div>
  <div class="tab-bar" id="tabBar"></div>
  <div class="status-bar" id="statusBar"><span class="status-dot"></span><span id="statusText">Loading…</span></div>
</div>
<div id="app"></div>
<script>
var KID='23';
var BEAM_START_DATE='2022-10-29'; // Source of truth: searchlight first lit on this date vs MIA
var CURRENT_SEASON=(function(){var n=new Date();return n.getMonth()>=9?n.getFullYear()+1:n.getFullYear()})();
// Seasons for current-season live fetch + coach probe
var HISTORICAL_SEASONS=[];for(var y=2002;y<=CURRENT_SEASON;y++)HISTORICAL_SEASONS.push(y);
function isPreBeam(g){return g.preBeam!==undefined?g.preBeam:(g.date<BEAM_START_DATE)}

// State: which tab is active
var ACTIVE_TAB='beam'; // 'beam' or 'historical'
var ALL_GAMES=[]; // accumulated games (history + current season)

function $(t,c,x){var e=document.createElement(t);if(c)e.className=c;if(x!==undefined)e.textContent=x;return e}
function pl(id){return'https://a.espncdn.com/i/headshots/nba/players/full/'+id+'.png'}
async function fj(u){var r=await fetch(u);if(!r.ok)throw new Error(r.status);return r.json()}
function pct(n,d){return d>0?(n/d*100).toFixed(0)+'%':'—'}
function sc(c){var s=c.score;if(s==null)return 0;if(typeof s==='object')return parseInt(s.displayValue||s.value,10)||0;return parseInt(s,10)||0}
function seasonName(yr){return(yr-1)+'-'+String(yr).slice(2)}
function seasonOfDate(d){var dt=new Date(d);return dt.getMonth()>=9?dt.getFullYear()+1:dt.getFullYear()}

function setStatus(t,done){var s=document.getElementById('statusBar');document.getElementById('statusText').textContent=t;if(done)s.classList.add('done')}
function hideStatus(){document.getElementById('statusBar').style.display='none'}

// Current-season cache (same key totals.html and facts.html share)
function curCacheKey(yr){return'lthe-games-v2-'+yr}
function readCur(yr){
  try{var raw=localStorage.getItem(curCacheKey(yr));if(!raw)return null;var c=JSON.parse(raw);if(Date.now()-c.cachedAt<6*3600*1000)return c.games;return null}catch(e){return null}
}
function writeCur(yr,games){try{localStorage.setItem(curCacheKey(yr),JSON.stringify({cachedAt:Date.now(),games:games}))}catch(e){}}

async function loadCurrentSeason(){
  var cached=readCur(CURRENT_SEASON);
  if(cached)return cached;
  var scheds=await Promise.all([
    fj('https://site.api.espn.com/apis/site/v2/sports/basketball/nba/teams/'+KID+'/schedule?season='+CURRENT_SEASON+'&seasontype=2').catch(function(){return{events:[]}}),
    fj('https://site.api.espn.com/apis/site/v2/sports/basketball/nba/teams/'+KID+'/schedule?season='+CURRENT_SEASON+'&seasontype=3').catch(function(){return{events:[]}})
  ]);
  var events=[].concat(scheds[0].events||[],scheds[1].events||[]);
  var finals=events.filter(function(e){return e.competitions?.[0]?.status?.type?.name==='STATUS_FINAL'});
  var seen={},uniq=[];finals.forEach(function(e){if(!seen[e.id]){seen[e.id]=1;uniq.push(e)}});
  var BATCH=10,results=[];
  for(var i=0;i<uniq.length;i+=BATCH){
    var batch=uniq.slice(i,i+BATCH);
    var batchResults=await Promise.all(batch.map(function(e){
      return fj('https://site.api.espn.com/apis/site/v2/sports/basketball/nba/summary?event='+e.id)
        .then(function(d){return extractGameLive(e,d)}).catch(function(){return null});
    }));
    batchResults.forEach(function(r){if(r)results.push(r)});
    setStatus('Crunching '+seasonName(CURRENT_SEASON)+'… '+Math.min(i+BATCH,uniq.length)+'/'+uniq.length);
  }
  writeCur(CURRENT_SEASON,results);
  return results;
}

function extractGameLive(event,summary){
  var comp=event.competitions?.[0];if(!comp)return null;
  var ks=comp.competitors?.find(function(x){return String(x.team?.id)===KID});
  var os=comp.competitors?.find(function(x){return String(x.team?.id)!==KID});
  if(!ks||!os)return null;
  var kScore=sc(ks),oScore=sc(os);
  // Extract SAC players who played
  var playersBox=summary.boxscore?.players||[];
  var sacBox=playersBox.find(function(t){return String(t.team?.id)===KID});
  var sacPlayers=[];
  if(sacBox){
    var sg=sacBox.statistics?.[0]||{};
    var labels=sg.labels||[];var minIdx=labels.indexOf('MIN');
    (sg.athletes||[]).forEach(function(a){
      if(a.didNotPlay)return;
      var mins=parseInt(a.stats?.[minIdx],10)||0;
      if(mins<=0)return;
      var ath=a.athlete||{};
      sacPlayers.push({id:String(ath.id||''),name:ath.displayName||ath.shortName||'',pos:ath.position?.abbreviation||'',min:mins});
    });
  }
  return{gameId:event.id,date:event.date,home:ks.homeAway==='home',won:kScore>oScore,
    kScore:kScore,oScore:oScore,opp:os.team?.abbreviation||'???',sacPlayers:sacPlayers};
}

// Aggregate per-player from a games array (each game has sacPlayers)
function aggregate(games){
  var map={};
  games.forEach(function(g){
    (g.sacPlayers||[]).forEach(function(p){
      if(!p.id)return;
      if(!map[p.id]){
        map[p.id]={id:p.id,name:p.name,pos:p.pos||'',
          homeBeams:0,homeGames:0,wins:0,games:0,seasons:{}};
      }
      var rec=map[p.id];
      rec.games++;
      if(g.won)rec.wins++;
      if(g.home){rec.homeGames++;if(g.won)rec.homeBeams++}
      // Track season + latest name/pos (most recent appearance)
      rec.seasons[seasonOfDate(g.date)]=1;
      if(p.name)rec.name=p.name;
      if(p.pos)rec.pos=p.pos;
    });
  });
  var arr=Object.values(map);
  arr.forEach(function(r){r.seasonCount=Object.keys(r.seasons).length});
  arr.sort(function(a,b){
    if(b.wins!==a.wins)return b.wins-a.wins;
    return b.games-a.games;
  });
  return arr;
}

async function loadAll(){
  // 1. Static history
  var history;
  try{setStatus('Loading career history…');history=await fj('/games-history.json');}
  catch(e){history={games:[]};setStatus('History file unavailable; live only…');}
  ALL_GAMES=(history.games||[]).slice();

  // Build tab bar (counts depend on data)
  renderTabs();
  rerenderActiveTab();

  // 2. Current season live
  setStatus('Crunching '+seasonName(CURRENT_SEASON)+'…');
  try{
    var current=await loadCurrentSeason();
    // Current season is beam-era by definition. Merge in.
    current.forEach(function(g){if(g.preBeam===undefined)g.preBeam=isPreBeam(g)});
    ALL_GAMES=ALL_GAMES.concat(current);
    renderTabs();
    rerenderActiveTab();
  }catch(e){}

  setStatus('All seasons loaded',true);
  setTimeout(hideStatus,2000);

  // Progressive current-team enrichment for visible players
  var visible=aggregateForTab(ALL_GAMES,ACTIVE_TAB);
  enrichTopPlayerTeams(visible.slice(0,40));
}

function renderTabs(){
  var bar=document.getElementById('tabBar');
  bar.textContent='';
  var beamGames=ALL_GAMES.filter(function(g){return!isPreBeam(g)}).length;
  var histGames=ALL_GAMES.filter(function(g){return isPreBeam(g)}).length;
  var tabs=[
    {key:'beam',label:'Beam Era',sub:'since Oct 29, 2022',count:beamGames},
    {key:'historical',label:'Pre-Beam History',sub:'2001-02 → Oct 2022',count:histGames}
  ];
  tabs.forEach(function(t){
    var el=document.createElement('a');el.className='tab'+(ACTIVE_TAB===t.key?' active':'');
    el.href='#';el.textContent=t.label;
    var c=$('span','count','('+t.count+' games)');el.appendChild(c);
    el.addEventListener('click',function(e){e.preventDefault();ACTIVE_TAB=t.key;renderTabs();rerenderActiveTab()});
    bar.appendChild(el);
  });
}

function rerenderActiveTab(){
  var players=aggregateForTab(ALL_GAMES,ACTIVE_TAB);
  renderPlayers(players,ACTIVE_TAB);
  // Re-enrich badges for newly visible players
  enrichTopPlayerTeams(players.slice(0,40));
}

// Filter games + aggregate. For beam tab: only beam-era games; metric label = "Beams".
// For historical tab: only pre-beam games; metric label = "Wins".
// A beam = ANY Kings win (home or road) the player was on the floor for.
function aggregateForTab(games,tab){
  var filtered=games.filter(function(g){
    if(tab==='beam')return!isPreBeam(g);
    return isPreBeam(g);
  });
  return aggregate(filtered);
}

// ===== Render players =====
function renderPlayers(rows,tab){
  var app=document.getElementById('app');
  var oldSec=document.getElementById('playerListSec');
  if(oldSec)oldSec.remove();
  var sec=$('div','list-section');sec.id='playerListSec';

  var metricLabel=tab==='beam'?'Beams':'Wins';

  var hdr=$('div','header-row');
  hdr.appendChild($('div','col-label','#'));
  hdr.appendChild($('div','ph'));
  var nameLbl=$('div','col-label','Player');nameLbl.style.textAlign='left';hdr.appendChild(nameLbl);
  hdr.appendChild($('div','col-label',metricLabel));
  hdr.appendChild($('div','col-label','Games'));
  hdr.appendChild($('div','col-label col-rate','Win %'));
  hdr.appendChild($('div','col-label col-seasons','Sns'));
  sec.appendChild(hdr);

  var list=$('div','player-list');
  rows.forEach(function(r,i){
    var row=document.createElement('a');row.className='player-row'+(i<5&&r.wins>0?' top':'');
    row.href='/player?id='+r.id;
    row.dataset.pid=r.id;
    row.appendChild($('div','rank',String(i+1)));
    var img=document.createElement('img');img.className='ph';img.src=pl(r.id);img.alt=r.name;
    img.onerror=function(){this.style.opacity='0.2';this.src='/kings-logo.png'};
    row.appendChild(img);
    var info=$('div','info');
    var nameLine=$('div','name-line');
    nameLine.appendChild($('div','name',r.name));
    nameLine.appendChild($('div','team-badge','···'));
    info.appendChild(nameLine);
    info.appendChild($('div','pos',r.pos||''));
    row.appendChild(info);
    row.appendChild($('div','beams',String(r.wins)));
    row.appendChild($('div','games',r.games+'g'));
    var rateClass=r.games>=15?'':'low';
    row.appendChild($('div','rate '+rateClass,pct(r.wins,r.games)));
    row.appendChild($('div','seasons',String(r.seasonCount)));
    list.appendChild(row);
  });
  sec.appendChild(list);
  var noteText;
  if(tab==='beam'){
    noteText='"Beams" = Sacramento Kings wins — home OR road — the player was on the floor for, since the beam was first lit on Oct 29, 2022. Every win lights the beam, not just home wins. "Games" = all games they played for the Kings during that window. "Win %" is across all those games. Pre-beam stints are tracked on the other tab.';
  }else{
    noteText='"Wins" = Sacramento Kings wins (home or road) the player was on the floor for, BEFORE the beam tradition started. These are not "beams" — the beam didn\'t exist yet. Data spans 2001-02 through October 28, 2022.';
  }
  sec.appendChild($('div','note',noteText));
  app.appendChild(sec);
}

// Progressive bio fetch for current-team badges (top N players to avoid 230 calls)
async function enrichTopPlayerTeams(rows){
  var BATCH=10;
  for(var i=0;i<rows.length;i+=BATCH){
    var batch=rows.slice(i,i+BATCH);
    await Promise.all(batch.map(function(r){
      return fetchPlayerTeam(r.id).then(function(team){
        r.currentTeam=team;renderBadge(r);
      }).catch(function(){
        var el=document.querySelector('[data-pid="'+r.id+'"] .team-badge');
        if(el){el.className='team-badge';el.textContent='—'}
      });
    }));
  }
}
function fetchPlayerTeam(id){
  var ck='lthe-team-v1-'+id;
  try{var raw=localStorage.getItem(ck);if(raw){var c=JSON.parse(raw);if(Date.now()-c.cachedAt<24*3600*1000)return Promise.resolve(c.team)}}catch(e){}
  return fj('https://site.api.espn.com/apis/common/v3/sports/basketball/nba/athletes/'+id).then(function(d){
    var a=d.athlete||d;
    var team={abbr:a.team?.abbreviation||'',name:a.team?.displayName||'',status:a.status?.name||a.status?.type||''};
    try{localStorage.setItem(ck,JSON.stringify({cachedAt:Date.now(),team:team}))}catch(e){}
    return team;
  });
}
function renderBadge(r){
  var el=document.querySelector('[data-pid="'+r.id+'"] .team-badge');
  if(!el||!r.currentTeam)return;
  var t=r.currentTeam;el.textContent='';
  // If player has a non-Active status (Inactive, Retired, etc), prefer that signal
  // — they may still have a "team" association in ESPN data (last team played for) but aren't actually on it.
  var isInactive=t.status&&t.status.toLowerCase()!=='active';
  if(t.abbr==='SAC'&&!isInactive){
    el.className='team-badge sac';el.appendChild($('span','','SAC'));
  }else if(t.abbr&&!isInactive){
    el.className='team-badge left';
    var img=document.createElement('img');img.src='https://a.espncdn.com/i/teamlogos/nba/500/'+t.abbr.toLowerCase()+'.png';img.alt=t.abbr;
    img.onerror=function(){this.style.display='none'};
    el.appendChild(img);el.appendChild($('span','',t.abbr));
  }else if(isInactive){
    el.className='team-badge inactive';
    el.textContent=t.status;
  }else{
    el.className='team-badge';el.textContent='—';
  }
}

// Coaches moved to dedicated /coaches page.

loadAll().catch(function(e){console.error(e);setStatus('Couldn\'t load',true)});
</script>
</body>
</html>
